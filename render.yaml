# Render Blueprint for ZORI Auto Spa
# This file configures automatic deployment on Render

services:
  # Backend Service
  - type: web
    name: zori-autospa-backend
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health

  # Frontend Service
  - type: web
    name: zori-autospa-frontend
    runtime: static
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false  # Set this manually in Render dashboard to backend URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
